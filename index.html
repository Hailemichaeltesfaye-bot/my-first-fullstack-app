<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="text-center mb-4 text-primary fw-bold">Task Manager</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <form id="taskForm" class="d-flex gap-2">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter a new task..." required>
                <button type="submit" class="btn btn-primary px-4">Add Task</button>
            </form>
        </div>

        <div class="card p-3 shadow-sm">
            <h5 class="card-title border-bottom pb-2 text-secondary">My Database Tasks</h5>
            <ul id="taskList" class="list-group list-group-flush">
                </ul>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/tasks';
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // 1. READ ACTION: Fetch rows from the tasks database table on page load
        async function loadTasks() {
            taskList.innerHTML = ''; // Reset UI view
            try {
                const response = await fetch(API_URL);
                const tasks = await response.json();
                
                if (tasks.length === 0) {
                    taskList.innerHTML = `<li class="text-muted text-center py-3">No tasks found in the table. Add one above!</li>`;
                    return;
                }

                // Loop through rows returned by MySQL query array
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center animate-fade-in';
                    li.innerHTML = `
                        <div>
                            <span class="fw-semibold">${task.title}</span>
                            <small class="text-muted d-block" style="font-size: 0.75rem;">Status: ${task.status}</small>
                        </div>
                        <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="deleteTask(${task.id})">Delete</button>
                    `;
                    taskList.appendChild(li);
                });
            } catch (error) {
                console.error('Error fetching data rows from API:', error);
                taskList.innerHTML = `<li class="text-danger text-center py-3">Failed to connect to backend server.</li>`;
            }
        }

        // 2. CREATE ACTION: Capture form submission and POST payload values to MySQL
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskTitle = taskInput.value.trim();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: taskTitle })
                });

                if (response.ok) {
                    taskInput.value = ''; // Clean form control field
                    loadTasks();         // Re-query database to update lists view
                }
            } catch (error) {
                console.error('Error posting item schema data:', error);
            }
        });

        // 3. DELETE ACTION: Send row ID parameter dynamically to clear database record
        async function deleteTask(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { 
                    method: 'DELETE' 
                });
                
                if (response.ok) {
                    loadTasks(); // Update display from database values
                }
            } catch (error) {
                console.error('Error removing item database row entry:', error);
            }
        }

        // Run this initialization block when DOM resources render completely
        loadTasks();
    </script>
</body>
</html>
